version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      MSSQL_SA_PASSWORD: "YourStrong@Pass123"
      ACCEPT_EULA: "Y"
    ports:
    - "14330:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./database:/usr/config # Gắn thư mục chứa file init.sql nguyên bản vào đây
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  # Dịch vụ phụ tự động xử lý tạo DB và nạp file init.sql gốc của bạn
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-init
    volumes:
      - ./database:/usr/config
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: >
      bash -c "
      echo '⏳ 1. Tạo database ECOMMERCE...';
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P YourStrong@Pass123 -C -Q \"IF DB_ID('ECOMMERCE') IS NULL CREATE DATABASE [ECOMMERCE]\";
      
      echo '⏳ 2. Nạp dữ liệu từ init.sql...';
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P YourStrong@Pass123 -C -d ECOMMERCE -i /usr/config/init.sql;
      
      echo '✅ Hoàn tất!';
      "

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      db-init:
        condition: service_completed_successfully # Backend chỉ khởi động khi data đã nạp xong thành công

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sql_data: